version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: leadforge_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leadforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadforge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-leadforge_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leadforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadforge_network

  # Redis (Celery broker + cache)
  redis:
    image: redis:7-alpine
    container_name: leadforge_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadforge_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadforge_backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-leadforge}:${POSTGRES_PASSWORD:-leadforge_secret}@postgres:5432/${POSTGRES_DB:-leadforge_db}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./exports:/app/exports
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - leadforge_network

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadforge_celery_worker
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-leadforge}:${POSTGRES_PASSWORD:-leadforge_secret}@postgres:5432/${POSTGRES_DB:-leadforge_db}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./exports:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,search,crawl,score
    networks:
      - leadforge_network

  # Celery Flower (monitoring)
  celery_flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadforge_flower
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - celery_worker
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    networks:
      - leadforge_network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadforge_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev
    networks:
      - leadforge_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: leadforge_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - leadforge_network

volumes:
  postgres_data:
  redis_data:

networks:
  leadforge_network:
    driver: bridge
